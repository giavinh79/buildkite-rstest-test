steps:
  - label: ":test_tube: Rstest JUnit import"
    key: "rstest-junit"
    command:
      - "npm install --global pnpm@10.33.4"
      - "pnpm install --frozen-lockfile"
      - "pnpm test:ci"
    artifact_paths:
      - "reports/**/*"
    secrets:
      - RSTEST_TEST_SUITE_TOKEN
    plugins:
      - test-collector#v1.11.0:
          files: "reports/junit.xml"
          format: "junit"
          api-token-env-name: "RSTEST_TEST_SUITE_TOKEN"
